<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy — addresses Electron's "Insecure CSP" warning.
        default-src 'self'              same-origin only by default
        script-src 'self' 'unsafe-inline'
                                         Vite's React Fast Refresh injects
                                         an inline preamble at dev time;
                                         without 'unsafe-inline' every
                                         component throws "@vitejs/plugin-react
                                         can't detect preamble". Production
                                         tightens this back to 'self' via the
                                         dev-aware header in src/main/index.ts
                                         (when both meta + header are set, the
                                         strictest wins per directive).
        style-src 'self' 'unsafe-inline' inline style attributes are pervasive
                                         in components (and in the React-style
                                         attribute prop); no inline <style>
                                         elements rely on this
        connect-src 'self' ws: wss: http://localhost:* http://127.0.0.1:*
                                         Vite HMR websocket + dev server
        img-src 'self' data:            small base64 icons inline
        font-src 'self' data:           any embedded webfonts
      Production tightening lives in src/main/index.ts attachCspHeader().
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss: http://localhost:* http://127.0.0.1:*; img-src 'self' data:; font-src 'self' data:;"
    />
    <title>Mission Control</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
