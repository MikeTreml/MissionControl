<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.f-row{display:grid;gap:6px}
.f-row label{font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.f-input,.f-sel{background:var(--canvas);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;width:100%}
.f-tog{display:inline-flex;align-items:center;gap:8px;font-size:13px}
.tog{width:30px;height:18px;background:var(--info);border-radius:999px;position:relative}
.tog::after{content:"";position:absolute;top:2px;left:14px;width:14px;height:14px;background:#08111f;border-radius:50%}
.tog.off{background:var(--border)}.tog.off::after{left:2px;background:var(--text-2)}
</style>
</head>
<body><div class="card-root" style="background:var(--surface);padding:14px;border-radius:12px;border:1px solid var(--border)">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="f-row"><label>Title</label><input class="f-input" value="Reflow paginator for nested groups"></div>
    <div class="f-row"><label>Project</label><select class="f-sel"><option>algorithmic-design (ALGD)</option><option>pipeline-runner (PIPE)</option></select></div>
    <div class="f-row"><label>Workflow</label><select class="f-sel"><option>plan → develop → review</option><option>Auto-generate</option></select></div>
    <div class="f-row"><label>Model</label><select class="f-sel"><option>claude-haiku-4-5</option><option>(pi default)</option></select></div>
  </div>
  <div style="display:flex;gap:18px;align-items:center;margin-top:4px">
    <span class="f-tog"><span class="tog"></span>Stream events</span>
    <span class="f-tog"><span class="tog off"></span>Auto-archive</span>
  </div>
</div></body></html>
