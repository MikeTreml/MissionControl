<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>.r{display:grid;gap:4px;align-content:start;text-align:center}.r .box{width:100%;height:54px;background:var(--raised);border:1px solid var(--border)}.r .lbl{font-size:11px;color:var(--text-2)}.r .px{font-family:var(--font-mono);font-size:10px;color:var(--muted)}</style>
</head>
<body><div class="card-root">
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:10px">
    <div class="r"><div class="box" style="border-radius:4px"></div><span class="lbl">xs</span><span class="px">4</span></div>
    <div class="r"><div class="box" style="border-radius:6px"></div><span class="lbl">sm</span><span class="px">6</span></div>
    <div class="r"><div class="box" style="border-radius:8px"></div><span class="lbl">md</span><span class="px">8</span></div>
    <div class="r"><div class="box" style="border-radius:10px"></div><span class="lbl">lg</span><span class="px">10</span></div>
    <div class="r"><div class="box" style="border-radius:12px"></div><span class="lbl">xl</span><span class="px">12</span></div>
    <div class="r"><div class="box" style="border-radius:14px"></div><span class="lbl">2xl ★</span><span class="px">14</span></div>
    <div class="r"><div class="box" style="border-radius:16px"></div><span class="lbl">3xl</span><span class="px">16</span></div>
    <div class="r"><div class="box" style="border-radius:999px;height:36px;margin-top:8px"></div><span class="lbl">pill</span><span class="px">999</span></div>
  </div>
  <div style="font-size:11px;color:var(--muted)">★ 14px is the canonical card / task radius.</div>
</div></body></html>
