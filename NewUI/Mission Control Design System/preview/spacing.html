<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>.bar{display:flex;align-items:center;gap:14px;font-size:12px}.b{height:14px;background:var(--info);border-radius:3px}.lbl{font-family:var(--font-mono);color:var(--muted);font-size:11px;width:48px}.tk{color:var(--text-2);width:60px}</style>
</head>
<body><div class="card-root" style="gap:6px">
  <div class="bar"><span class="lbl">2</span><span class="tk">space-1</span><div class="b" style="width:2px"></div></div>
  <div class="bar"><span class="lbl">4</span><span class="tk">space-2</span><div class="b" style="width:4px"></div></div>
  <div class="bar"><span class="lbl">6</span><span class="tk">space-3</span><div class="b" style="width:6px"></div></div>
  <div class="bar"><span class="lbl">8</span><span class="tk">space-4</span><div class="b" style="width:8px"></div></div>
  <div class="bar"><span class="lbl">10</span><span class="tk">space-5</span><div class="b" style="width:10px"></div></div>
  <div class="bar"><span class="lbl">12</span><span class="tk">space-6</span><div class="b" style="width:12px"></div></div>
  <div class="bar"><span class="lbl">14 ★</span><span class="tk">space-7</span><div class="b" style="width:14px"></div></div>
  <div class="bar"><span class="lbl">18 ★</span><span class="tk">space-8</span><div class="b" style="width:18px"></div></div>
  <div class="bar"><span class="lbl">24</span><span class="tk">space-9</span><div class="b" style="width:24px"></div></div>
  <div style="font-size:11px;color:var(--muted);margin-top:4px">★ 14 = card padding · 18 = shell padding</div>
</div></body></html>
