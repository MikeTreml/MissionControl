<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
    <div class="swatch" style="border-color:#1B2A1F">
      <div class="swatch-fill" style="background:#4ADE80"></div>
      <div class="swatch-meta"><span class="name" style="color:#4ADE80">Success</span><span class="hex">#4ADE80 / #1B2A1F</span></div>
    </div>
    <div class="swatch" style="border-color:#2A2417">
      <div class="swatch-fill" style="background:#F5B544"></div>
      <div class="swatch-meta"><span class="name" style="color:#F5B544">Warning</span><span class="hex">#F5B544 / #2A2417</span></div>
    </div>
    <div class="swatch" style="border-color:#2A1B1B">
      <div class="swatch-fill" style="background:#F87171"></div>
      <div class="swatch-meta"><span class="name" style="color:#F87171">Danger</span><span class="hex">#F87171 / #2A1B1B</span></div>
    </div>
    <div class="swatch" style="border-color:#1A2333">
      <div class="swatch-fill" style="background:#60A5FA"></div>
      <div class="swatch-meta"><span class="name" style="color:#60A5FA">Info</span><span class="hex">#60A5FA / #1A2333</span></div>
    </div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <span class="pill good">running</span>
    <span class="pill warn">awaiting input</span>
    <span class="pill bad">failed</span>
    <span class="pill info">selected</span>
  </div>
  <div style="font-size:11px;color:var(--muted)">Reserved for state. Projects can't pick these.</div>
</div></body></html>
