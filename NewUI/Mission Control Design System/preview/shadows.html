<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root" style="gap:18px">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">
    <div style="display:grid;gap:6px">
      <div style="background:var(--raised);border:1px solid var(--border);border-radius:14px;padding:14px;height:64px;display:flex;align-items:center;font-size:13px">Flat — default chrome</div>
      <span style="font-size:11px;color:var(--muted)">none</span>
    </div>
    <div style="display:grid;gap:6px">
      <div style="background:rgba(29,34,48,0.98);border:1px solid var(--border);border-left:3px solid var(--info);border-radius:12px;padding:14px;height:64px;box-shadow:0 12px 28px rgba(0,0,0,0.35);font-size:13px">Toast — elevation 1</div>
      <span style="font-size:11px;color:var(--muted);font-family:var(--font-mono)">0 12 28 rgba(0,0,0,.35)</span>
    </div>
    <div style="display:grid;gap:6px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;height:64px;box-shadow:0 8px 24px rgba(0,0,0,0.35);font-size:13px">Menu — elevation 2</div>
      <span style="font-size:11px;color:var(--muted);font-family:var(--font-mono)">0 8 24 rgba(0,0,0,.35)</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="width:9px;height:9px;border-radius:50%;background:var(--success);box-shadow:0 0 0 2px rgba(74,222,128,0.25)"></span>
    <span style="font-size:12px">Halo — bridge / status dot</span>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">0 0 0 2px rgba(c,.25)</span>
  </div>
</div></body></html>
