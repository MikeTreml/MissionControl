<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.tcard{background:var(--raised);border:1px solid var(--border);border-radius:14px;padding:14px;position:relative;display:grid;gap:6px}
.tcard.active{outline:1px solid var(--info)}
.tcard.blocked{border-left:3px solid var(--danger)}
.tcard .tid{font-weight:700;font-family:var(--font-mono);font-size:14px}
.tcard .tsum{font-size:13px}
.tcard .tstep{font-size:13px;color:var(--text-2)}
.tcard .tsub{font-size:12px;color:var(--text-2)}
.tcard .tmeta{font-size:11px;color:var(--muted)}
.ricon{position:absolute;top:8px;right:10px;font-size:14px}
</style>
</head>
<body><div class="card-root">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="tcard active" style="border-left:3px solid #7F77DD">
      <span class="ricon">📁</span>
      <div class="tid">ALGD-0143</div>
      <div class="tsum">Reflow paginator for nested groups</div>
      <div class="tstep"><span class="pill good" style="margin-right:6px">running</span>Developer · cycle 2</div>
      <div class="tsub">last event: pi:tool_execution_start</div>
      <div class="tmeta">Model: claude-haiku-4-5</div>
    </div>
    <div class="tcard blocked">
      <span class="ricon">🚧</span>
      <div class="tid">PIPE-0029</div>
      <div class="tsum">Add retries to journal flush</div>
      <div class="tstep"><span class="pill warn" style="margin-right:6px">awaiting input</span>plan ready</div>
      <div class="tmeta">idle 3h</div>
    </div>
  </div>
</div></body></html>
