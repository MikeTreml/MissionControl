<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root" style="background:var(--surface);padding:18px;border-radius:12px;border:1px solid var(--border);gap:14px">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="width:9px;height:9px;border-radius:50%;background:var(--success);box-shadow:0 0 0 2px rgba(74,222,128,0.25)"></span>
    <span style="font-size:12px;color:var(--text-2)">bridge ok</span>
    <span style="font-size:11px;color:var(--muted);margin-left:auto;font-family:var(--font-mono)">v0.1.0</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span style="width:9px;height:9px;border-radius:50%;background:var(--danger);box-shadow:0 0 0 2px rgba(248,113,113,0.25)"></span>
    <span style="font-size:12px;color:var(--text-2)">bridge offline</span>
  </div>
  <div style="display:flex;gap:14px;align-items:center;font-size:12px;color:var(--text-2);border-top:1px solid var(--border);padding-top:12px">
    <span style="font-family:var(--font-mono)">tokens 412k</span>
    <span style="color:var(--muted)">·</span>
    <span style="font-family:var(--font-mono)">$2.31</span>
    <span style="color:var(--muted);margin-left:auto;font-size:11px">pinned footer (right rail)</span>
  </div>
</div></body></html>
