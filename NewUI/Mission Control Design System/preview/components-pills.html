<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div style="display:flex;flex-wrap:wrap;gap:8px">
    <span class="pill good">running</span>
    <span class="pill warn">awaiting input</span>
    <span class="pill warn">paused</span>
    <span class="pill bad">failed</span>
    <span class="pill bad">blocked</span>
    <span class="pill info">selected</span>
    <span class="pill info">draft</span>
  </div>
  <div style="font-size:11px;color:var(--muted);font-family:var(--font-mono)">padding: 4px 9px · radius: 999 · 12/700 · bg rgba(c,.15)</div>
  <div style="font-size:11px;color:var(--muted)">Status reads as a verb. Never "Status: Running".</div>
</div></body></html>
