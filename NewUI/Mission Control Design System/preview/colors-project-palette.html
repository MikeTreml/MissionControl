<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.proj { display:grid; gap:6px; padding:6px; border:1px solid var(--border); border-radius:8px; background:var(--surface); }
.proj .chip { height:36px; border-radius:6px; }
.proj .name { font-size:11px; font-weight:600; }
.proj .hex { font-family:var(--font-mono); font-size:10px; color:var(--muted); }
</style>
</head>
<body><div class="card-root">
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
    <div class="proj"><div class="chip" style="background:#7F77DD"></div><span class="name">Iris</span><span class="hex">#7F77DD</span></div>
    <div class="proj"><div class="chip" style="background:#1D9E75"></div><span class="name">Pine</span><span class="hex">#1D9E75</span></div>
    <div class="proj"><div class="chip" style="background:#D85A30"></div><span class="name">Clay</span><span class="hex">#D85A30</span></div>
    <div class="proj"><div class="chip" style="background:#D4537E"></div><span class="name">Rose</span><span class="hex">#D4537E</span></div>
    <div class="proj"><div class="chip" style="background:#378ADD"></div><span class="name">Sky</span><span class="hex">#378ADD</span></div>
    <div class="proj"><div class="chip" style="background:#BA7517"></div><span class="name">Bronze</span><span class="hex">#BA7517</span></div>
    <div class="proj"><div class="chip" style="background:#639922"></div><span class="name">Moss</span><span class="hex">#639922</span></div>
    <div class="proj"><div class="chip" style="background:#5DCAA5"></div><span class="name">Mint</span><span class="hex">#5DCAA5</span></div>
    <div class="proj"><div class="chip" style="background:#AFA9EC"></div><span class="name">Lilac</span><span class="hex">#AFA9EC</span></div>
    <div class="proj"><div class="chip" style="background:#888780"></div><span class="name">Stone</span><span class="hex">#888780</span></div>
  </div>
  <div style="font-size:11px;color:var(--muted)">No greens / ambers / reds — those belong to state.</div>
</div></body></html>
