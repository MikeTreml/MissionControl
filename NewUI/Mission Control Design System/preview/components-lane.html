<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px"><h3 style="margin:0;font-size:16px">Active</h3><span style="font-size:12px;color:var(--text-2)">3</span></div>
      <div style="background:var(--raised);border:1px solid var(--border);border-radius:14px;padding:10px;border-left:3px solid #7F77DD;font-family:var(--font-mono);font-size:12px;font-weight:700;margin-bottom:8px">ALGD-0143</div>
      <div style="background:var(--raised);border:1px solid var(--border);border-radius:14px;padding:10px;border-left:3px solid #D85A30;font-family:var(--font-mono);font-size:12px;font-weight:700">PIPE-0029</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px"><h3 style="margin:0;font-size:16px">Attention</h3><span style="font-size:12px;color:var(--text-2)">1</span></div>
      <div style="background:var(--raised);border:1px solid var(--border);border-radius:14px;padding:10px;border-left:3px solid #5DCAA5;font-family:var(--font-mono);font-size:12px;font-weight:700">MEM-0008</div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px"><h3 style="margin:0;font-size:16px">Complete</h3><span style="font-size:12px;color:var(--text-2)">—</span></div>
      <div style="font-size:12px;color:var(--text-2);padding:6px 2px">—</div>
    </div>
  </div>
</div></body></html>
