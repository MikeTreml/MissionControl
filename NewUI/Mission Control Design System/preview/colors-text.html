<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-root">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;display:grid;gap:10px">
    <div style="display:flex;align-items:baseline;gap:14px">
      <span style="color:#E6E7EA;font-size:18px;font-weight:700">Primary text</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#E6E7EA · titles, IDs</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:14px">
      <span style="color:#9DA3AE;font-size:14px;font-weight:500">Secondary text</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#9DA3AE · metadata, sub</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:14px">
      <span style="color:#6E7480;font-size:12px">Muted text</span>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#6E7480 · timestamps, hints</span>
    </div>
  </div>
</div></body></html>
